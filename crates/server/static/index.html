<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clues</title>
    <link rel="stylesheet" href="/styles.css?v=20260321d" />
  </head>
  <body>
    <main class="page">
      <section class="topbar">
        <div class="brand">
          <h1 id="puzzle-title">Clues</h1>
        </div>

        <div class="controls">
          <button id="open-editor" class="button button-secondary" type="button" disabled>
            Open in Editor
          </button>

          <button id="clear-board" class="button button-secondary" type="button">
            Clear
          </button>

          <button id="new-random" class="button button-secondary" type="button">
            New Puzzle
          </button>

          <button id="share-puzzle" class="button button-secondary" type="button">
            Share
          </button>
        </div>
      </section>

      <section id="board-shell" class="board-shell">
        <section id="board" class="board" aria-live="polite"></section>
      </section>
    </main>

    <aside id="score-debug" class="score-debug" hidden></aside>

    <div id="guess-modal" class="modal" hidden>
      <div id="guess-backdrop" class="modal-backdrop"></div>
      <div
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="guess-title"
      >
        <span id="guess-emoji" class="modal-emoji" aria-hidden="true"></span>
        <h2 id="guess-title" class="modal-title"></h2>
        <div class="modal-actions">
          <button id="guess-innocent" class="button button-good" type="button">
            Innocent
          </button>
          <button id="guess-criminal" class="button button-bad" type="button">
            Criminal
          </button>
        </div>
        <button id="guess-cancel" class="button button-secondary modal-dismiss" type="button">
          Cancel
        </button>
      </div>
    </div>

    <div id="error-modal" class="modal" hidden>
      <div id="error-backdrop" class="modal-backdrop"></div>
      <div class="modal-card" role="alertdialog" aria-modal="true" aria-labelledby="error-title">
        <h2 id="error-title" class="modal-title modal-title-error"></h2>
        <p id="error-message" class="modal-message"></p>
        <button id="error-dismiss" class="button button-secondary modal-dismiss" type="button">
          Dismiss
        </button>
      </div>
    </div>

    <div id="start-modal" class="modal" hidden>
      <div id="start-backdrop" class="modal-backdrop"></div>
      <div class="modal-card start-modal-card" role="dialog" aria-modal="true" aria-label="Start Puzzle">
        <button id="start-button" class="button button-good start-button" type="button">
          START
        </button>
      </div>
    </div>

    <div id="confirm-modal" class="modal" hidden>
      <div id="confirm-backdrop" class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <h2 id="confirm-title" class="modal-title"></h2>
        <p id="confirm-message" class="modal-message"></p>
        <div class="modal-actions">
          <button id="confirm-accept" class="button button-secondary" type="button">
            Confirm
          </button>
          <button id="confirm-cancel" class="button button-secondary" type="button">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <div id="new-puzzle-modal" class="modal" hidden>
      <div id="new-puzzle-backdrop" class="modal-backdrop"></div>
      <div class="modal-card new-puzzle-modal-card" role="dialog" aria-modal="true" aria-labelledby="new-puzzle-title">
        <h2 id="new-puzzle-title" class="modal-title modal-title-error">New Puzzle</h2>
        <div class="new-puzzle-pickers">
          <label class="new-puzzle-picker">
            <span class="new-puzzle-label">Rows</span>
            <div class="new-puzzle-stepper">
              <button id="new-puzzle-rows-up" class="button button-secondary new-puzzle-step" type="button">
                ↑
              </button>
              <div
                id="new-puzzle-rows-value"
                class="new-puzzle-value"
                role="spinbutton"
                tabindex="0"
                aria-label="Rows"
                aria-valuemin="1"
                aria-valuemax="20"
              ></div>
              <button id="new-puzzle-rows-down" class="button button-secondary new-puzzle-step" type="button">
                ↓
              </button>
            </div>
          </label>
          <label class="new-puzzle-picker">
            <span class="new-puzzle-label">Cols</span>
            <div class="new-puzzle-stepper">
              <button id="new-puzzle-cols-up" class="button button-secondary new-puzzle-step" type="button">
                ↑
              </button>
              <div
                id="new-puzzle-cols-value"
                class="new-puzzle-value"
                role="spinbutton"
                tabindex="0"
                aria-label="Cols"
                aria-valuemin="1"
                aria-valuemax="20"
              ></div>
              <button id="new-puzzle-cols-down" class="button button-secondary new-puzzle-step" type="button">
                ↓
              </button>
            </div>
          </label>
        </div>
        <div class="modal-actions">
          <button id="new-puzzle-cancel" class="button button-secondary" type="button">
            Cancel
          </button>
          <button id="new-puzzle-confirm" class="button button-good" type="button">
            Start
          </button>
        </div>
      </div>
    </div>

    <div id="finish-modal" class="modal" hidden>
      <div id="finish-backdrop" class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="finish-title">
        <h2 id="finish-title" class="modal-title">Puzzle Complete</h2>
        <p id="finish-message" class="modal-message finish-time"></p>
        <pre id="finish-grid" class="finish-grid"></pre>
        <div class="modal-actions">
          <button id="finish-copy" class="button button-secondary" type="button">
            Copy Result
          </button>
          <button id="finish-dismiss" class="button button-secondary" type="button">
            Done
          </button>
        </div>
      </div>
    </div>

    <div id="corner-note-menu" class="note-menu" hidden aria-hidden="true">
      <div id="corner-note-menu-card" class="note-menu-card">
        <div class="note-menu-option note-yellow" data-color="yellow"></div>
        <div class="note-menu-option note-red" data-color="red"></div>
        <div class="note-menu-option note-green" data-color="green"></div>
        <div class="note-menu-option note-orange" data-color="orange"></div>
        <div class="note-menu-option note-magenta" data-color="magenta"></div>
        <div class="note-menu-option note-cyan" data-color="cyan"></div>
      </div>
    </div>

    <template id="cell-template">
      <article class="cell">
        <div class="cell-top">
          <span class="cell-position"></span>
          <button class="cell-note" type="button" aria-label="Tile note"></button>
          <button class="cell-note-secondary" type="button" aria-label="Tile color note"></button>
        </div>
        <div class="cell-header">
          <span class="cell-emoji" aria-hidden="true"></span>
          <span class="cell-name"></span>
          <span class="cell-role"></span>
        </div>
        <p class="cell-clue"></p>
      </article>
    </template>

    <script src="/app.js?v=20260321f" defer></script>
  </body>
</html>
