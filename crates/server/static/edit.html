<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clues Editor</title>
    <link rel="stylesheet" href="/styles.css?v=20260321d" />
    <link rel="stylesheet" href="/editor.css?v=20260321g" />
  </head>
  <body class="editor-body">
    <main class="page editor-page">
      <section class="topbar">
        <div class="brand editor-brand">
          <h1>Clues Editor</h1>
          <label class="editor-size-control editor-author-control editor-brand-author-control">
            <span class="editor-size-label">Author</span>
            <input
              id="author-input"
              class="editor-input editor-author-input"
              type="text"
              maxlength="60"
              placeholder="Optional"
            />
          </label>
        </div>

        <div class="controls editor-controls">
          <label class="editor-size-control">
            <span class="editor-size-label">Rows</span>
            <select id="rows-select" class="editor-select"></select>
          </label>

          <label class="editor-size-control">
            <span class="editor-size-label">Cols</span>
            <select id="cols-select" class="editor-select"></select>
          </label>

          <button id="reset-editor" class="button button-secondary" type="button">
            Reset Layout
          </button>

          <button id="generate-remaining" class="button button-secondary" type="button" disabled>
            Suggest a Clue
          </button>

          <button id="undo-edit" class="button button-secondary" type="button" disabled>
            Remove a Clue
          </button>

          <button id="share-editor" class="button button-primary" type="button" hidden disabled>
            Share Puzzle
          </button>
        </div>
      </section>

      <section id="editor-prompt-bar" class="editor-prompt-bar">
        <p id="editor-prompt" class="editor-prompt"></p>
        <p id="editor-share-link" class="editor-share-link" hidden></p>
      </section>

      <section class="editor-layout">
        <section class="board-shell editor-board-shell">
          <section id="editor-board" class="board" aria-live="polite"></section>
        </section>

        <aside class="editor-sidebar">
          <section class="editor-panel">
            <div class="editor-panel-body">
              <div id="editor-empty-state" class="editor-empty-state"></div>

              <div id="editor-inspector" class="editor-inspector" hidden>
                <div class="editor-static-section">
                  <div class="editor-tile-summary">
                    <div class="editor-tile-summary-main">
                      <span id="selected-position" class="eyebrow"></span>
                      <div class="editor-heading-row">
                        <h3 id="selected-heading" class="editor-selected-heading"></h3>
                        <div id="editor-inline-details" class="editor-inline-details" hidden>
                          <button
                            id="selected-emoji"
                            class="editor-selected-emoji editor-emoji-button"
                            type="button"
                            aria-label="Choose emoji"
                          ></button>
                          <input
                            id="rename-input"
                            class="editor-inline-input editor-inline-name"
                            type="text"
                            maxlength="40"
                          />
                          <select
                            id="role-input"
                            class="editor-select editor-inline-role-input"
                          ></select>
                        </div>
                        <button
                          id="edit-toggle"
                          class="editor-icon-button"
                          type="button"
                          aria-label="Edit tile"
                        >
                          ✎
                        </button>
                      </div>
                    </div>
                    <div id="selected-badges" class="editor-badge-stack" hidden></div>
                  </div>
                </div>

                <div class="editor-dynamic-section">
                  <div id="initial-answer-panel" class="editor-action-panel" hidden>
                    <div class="editor-dual-actions">
                      <button
                        id="set-initial-innocent"
                        class="button button-good"
                        type="button"
                      >
                        Start as Innocent
                      </button>
                      <button
                        id="set-initial-criminal"
                        class="button button-bad"
                        type="button"
                      >
                        Start as Criminal
                      </button>
                    </div>
                  </div>

                  <div id="clue-section" class="editor-action-panel" hidden>
                    <div class="editor-section-head">
                      <div>
                        <p class="eyebrow">Clue</p>
                        <h3 class="editor-section-title">Add Clue</h3>
                      </div>
                      <button
                        id="suggest-clue"
                        class="button button-recommended editor-suggest-button"
                        type="button"
                      >
                        Suggest A Clue
                      </button>
                    </div>

                    <div class="editor-field">
                      <span class="eyebrow">Kind</span>
                      <div id="clue-kind-picker" class="editor-kind-picker"></div>
                    </div>

                    <div class="editor-clue-divider" aria-hidden="true"></div>

                    <div id="clue-preview" class="editor-clue-preview"></div>

                    <div id="clue-form-fields" class="editor-clue-fields"></div>

                    <div class="editor-action-footer">
                      <button
                        id="save-clue"
                        class="button button-bad"
                        type="button"
                      >
                        Save Clue
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <div id="emoji-picker-modal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div
        class="modal-card editor-emoji-modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="emoji-picker-title"
      >
        <h2 id="emoji-picker-title" class="modal-title modal-title-error">Choose Emoji</h2>
        <div id="emoji-picker-grid" class="editor-emoji-grid"></div>
        <label class="editor-field">
          <span class="eyebrow">Custom</span>
          <div class="editor-form-row editor-emoji-custom-row">
            <input
              id="emoji-custom-input"
              class="editor-input editor-emoji-custom-input"
              type="text"
              maxlength="32"
              placeholder="Any emoji"
            />
          </div>
        </label>
        <div class="editor-action-footer">
          <button id="emoji-default" class="button button-secondary" type="button">
            Default
          </button>
          <button id="emoji-close" class="button button-good" type="button">
            Done
          </button>
        </div>
      </div>
    </div>

    <div id="custom-role-modal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div
        class="modal-card editor-custom-role-modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="custom-role-title"
      >
        <h2 id="custom-role-title" class="modal-title modal-title-error">Custom Role</h2>
        <input
          id="custom-role-input"
          class="editor-input editor-custom-role-input"
          type="text"
          maxlength="40"
          placeholder="Enter a role"
        />
        <div class="modal-actions">
          <button id="custom-role-cancel" class="button button-secondary" type="button">
            Cancel
          </button>
          <button id="custom-role-save" class="button button-good" type="button">
            Use Role
          </button>
        </div>
      </div>
    </div>

    <div id="editor-error-modal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="alertdialog" aria-modal="true" aria-labelledby="editor-error-title">
        <h2 id="editor-error-title" class="modal-title modal-title-error"></h2>
        <p id="editor-error-message" class="modal-message"></p>
        <button id="editor-error-dismiss" class="button button-secondary modal-dismiss" type="button">
          Dismiss
        </button>
      </div>
    </div>

    <template id="editor-cell-template">
      <article class="cell editor-cell">
        <div class="cell-top">
          <span class="cell-position"></span>
        </div>
        <div class="cell-header">
          <span class="cell-emoji" aria-hidden="true"></span>
          <span class="cell-name"></span>
          <span class="cell-role"></span>
        </div>
        <button class="editor-clue-button cell-clue" type="button"></button>
      </article>
    </template>

    <script src="/editor.js?v=20260321f" defer></script>
  </body>
</html>
